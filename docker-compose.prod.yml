# Prod overlay: gunicorn (image default entrypoint) + nginx reverse proxy.
# This is the server base — always combined with the tls overlay in production:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.tls.yml up -d
# (Local work uses the dev overlay, not this one.)
services:
  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  web:
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      # One proxy (nginx) in front → DRF reads the real client IP from X-Forwarded-For.
      DJANGO_NUM_PROXIES: "1"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      # Wait for a passing /health/ so nginx never starts pointing at a dead upstream.
      web:
        condition: service_healthy

volumes:
  logs:
