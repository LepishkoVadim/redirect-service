# TLS overlay: Let's Encrypt certs via certbot (webroot), HTTPS on :443.
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.tls.yml up -d
# Bootstrap the first certificate with docker/init-letsencrypt.sh.
services:
  nginx:
    volumes:
      - ./nginx/nginx.tls.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    # Reload every 6h so renewed certificates are picked up without a restart.
    command: >-
      /bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Attempt renewal twice a day; no-op until a cert is within its renewal window.
    entrypoint: >-
      /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'

volumes:
  certbot-etc:
  certbot-www:
