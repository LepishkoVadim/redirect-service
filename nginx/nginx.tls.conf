# nginx reverse proxy with TLS (Let's Encrypt). Used via docker-compose.tls.yml.
# The domain appears ONLY in the ssl_certificate paths below (Let's Encrypt live dir) —
# the single per-domain edit if you deploy under a different name. server_name is `_`.

upstream web {
    server web:8000;
}

limit_req_zone $binary_remote_addr zone=public_redirect:10m rate=20r/s;

# Don't advertise the nginx version in headers/error pages.
server_tokens off;

# HTTP :80 — serve ACME challenges, redirect everything else to HTTPS.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — terminate TLS, proxy to gunicorn.
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/redirect-service.pp.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/redirect-service.pp.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    # TLS session reuse — cheaper handshakes for returning clients.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 1m;

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /redirect/public/ {
        limit_req zone=public_redirect burst=40 nodelay;
        limit_req_status 503;
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
