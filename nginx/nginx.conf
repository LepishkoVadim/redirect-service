# nginx reverse proxy for the redirect-service web (gunicorn) upstream.
# Layer 1 rate limiting (coarse, by IP) sits here, before Django/DRF throttling.

upstream web {
    server web:8000;
}

# Flood defense on the public redirect path, keyed by client IP.
# ~20 req/s with a burst buffer; over-limit requests get 503 (before hitting Django).
limit_req_zone $binary_remote_addr zone=public_redirect:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    # Cap request body — this API only takes small JSON payloads.
    client_max_body_size 1m;

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /redirect/public/ {
        limit_req zone=public_redirect burst=40 nodelay;
        limit_req_status 503;
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# HTTPS lives in nginx.tls.conf (mounted by docker-compose.tls.yml); this file is the
# plain-HTTP config used by the prod overlay for local/CI runs without certificates.
